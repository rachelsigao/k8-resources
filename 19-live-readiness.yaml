apiVersion: v1
kind: Pod
metadata:
  # Label helps identify/select this pod
  labels:
    test: liveness
  # Pod name
  name: liveness-http
spec:
  containers:
  - name: liveness
    # NGINX web server container
    image: nginx
    # Liveness probe: checks if container is alive.
    # If this check fails repeatedly, Kubernetes restarts the container.
    livenessProbe:
      tcpSocket:
        # Check if port 80 is accepting TCP connections
        port: 80
      # Wait 30s after container start before first liveness check
      initialDelaySeconds: 30
      # Run liveness check every 10s
      periodSeconds: 10
    # Readiness probe: checks if container is ready to serve traffic.
    # Pod is added to Service endpoints only when this probe passes.
    readinessProbe:
      httpGet:
        # Send HTTP GET request to root path
        path: /
        port: 80
      # Wait 40s after start before first readiness check
      initialDelaySeconds: 40
      # Run readiness check every 3s
      periodSeconds: 3
